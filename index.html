<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUNTER √Ч HUTER ARENA BATTLE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
<div id="title-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:40000; background-color: #000; display:flex; align-items:center; justify-content:center; cursor:pointer;">

</div>

<div id="mode-select-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 30000; justify-content: center; align-items: center;">
    <div class="deck-select-modal">
        <h2>гГЧгГђгВ§гГҐгГЉгГЙгВТйБЄжКЮ</h2>
        <button class="deck-btn" style="background: linear-gradient(to bottom, #2ecc71, #27ae60);" onclick="selectMode('offline')">рЯТї CPUеѓЊжИ¶пЉИгВ™гГХгГ©гВ§гГ≥пЉЙ</button>
        <button class="deck-btn" style="background: linear-gradient(to bottom, #9b59b6, #8e44ad);" onclick="selectMode('online')">рЯМР гГЧгГђгВ§гГ§гГЉеѓЊжИ¶пЉИгВ™гГ≥гГ©гВ§гГ≥пЉЙ</button>
    </div>
</div>

<div id="deck-select-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center;">
    <div class="deck-select-modal">
        <h2>иЗ™еИЖгБЃгГЗгГГгВ≠гВТйБЄжКЮ</h2>
        <button class="deck-btn" onclick="selectDeck('287жЬЯеПЧй®УзФЯ')">287жЬЯеПЧй®УзФЯгГЗгГГгВ≠</button>
        <button class="deck-btn" onclick="selectDeck('еєїељ±жЧЕеЫ£')">еєїељ±жЧЕеЫ£гГЗгГГгВ≠</button>
        <button class="deck-btn" onclick="selectDeck('гГЮгГХгВ£гВҐгГ≥гВ≥гГЯгГ•гГЛгГЖгВ£гГЉпљЮгВҐгВ∞гГ≠пљЮ')">гГЮгГХгВ£гВҐгГ≥гВ≥гГЯгГ•гГЛгГЖгВ£гГЉпљЮгВҐгВ∞гГ≠пљЮ</button>
        <button class="deck-btn" onclick="selectDeck('гГЮгГХгВ£гВҐгГ≥гВ≥гГЯгГ•гГЛгГЖгВ£гГЉпљЮиАРдєЕпљЮ')">гГЮгГХгВ£гВҐгГ≥гВ≥гГЯгГ•гГЛгГЖгВ£гГЉпљЮиАРдєЕпљЮ</button>
    </div>
</div>

<div id="room-select-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center;">
    <div class="deck-select-modal">
        <h2>гВ™гГ≥гГ©гВ§гГ≥еѓЊжИ¶</h2>
        <p style="font-size:12px; color:#aaa; margin-bottom:15px;">гГЗгГГгВ≠пЉЪ<span id="selected-deck-name" style="color:#00d2ff;"></span></p>
        <button class="deck-btn" onclick="createRoom()">йГ®е±ЛгВТдљЬгВЛ</button>
        <div style="margin: 20px 0; border-bottom: 1px solid #555;"></div>
        <input type="text" id="room-id-input" placeholder="гГЂгГЉгГ†IDгВТеЕ•еКЫ" style="width: 80%; padding: 10px; margin-bottom: 10px; text-align: center; font-size: 16px; border-radius: 5px; border: 1px solid #00d2ff; background: #111; color: #fff;">
        <button class="deck-btn" style="background: linear-gradient(to bottom, #d80032, #6a0018);" onclick="joinRoom()">йГ®е±ЛгБЂеЕ•гВЛ</button>
    </div>
</div>

<div id="waiting-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; justify-content: center; align-items: center; flex-direction: column;">
    <h2 style="color: #fff; text-shadow: 0 0 10px #00d2ff; margin-bottom: 10px;">гГЂгГЉгГ†ID: <span id="display-room-id" style="font-size: 32px; color: #00d2ff;"></span></h2>
    <p style="color: #ccc;">еѓЊжИ¶зЫЄжЙЛгВТеЊЕгБ£гБ¶гБДгБЊгБЩ...</p>
</div>

<div id="app-container" style="display:none;">
    <div id="mulligan-overlay">
        <div id="mulligan-title">дЇ§жПЫгВЂгГЉгГЙйБЄжКЮ</div>
        <div class="mulligan-grid">
            <div id="mul-top" class="mul-pos"></div><div id="mul-left" class="mul-pos"></div>
            <div id="mul-right" class="mul-pos"></div><div id="mul-bottom" class="mul-pos"></div>
        </div>
        <div class="gp-hex-wrapper" id="mulligan-ok-btn">
            <div class="gp-hex-inner gp-btn-blue">OK</div>
        </div>
    </div>

    <div id="hand-select-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 20, 0.95); z-index: 10000; flex-direction: column; align-items: center; justify-content: center;">
        <div id="hand-select-title" style="font-size: 16px; margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid #00d2ff; padding-bottom: 5px; letter-spacing: 2px;">еѓЊи±°гБЃгВЂгГЉгГЙгВТйБЄжКЮгБЧгБ¶гБПгБ†гБХгБД</div>
        <div id="hand-select-grid" style="display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; max-width: 90%;"></div>
        <button id="hand-select-ok-btn" style="padding: 10px 50px; font-size: 16px; font-weight: bold; background: linear-gradient(to bottom, #00d2ff, #007bb5); border: 2px solid #fff; border-radius: 8px; color: white; cursor: pointer;">ж±ЇеЃЪ</button>
    </div>

    <div class="hud-container">
        <div class="hud-icon-diamond"><div class="hud-icon-inner" style="color:#aaa;"></div></div>
        <div class="hud-center">
            <div class="hud-controls-row">
                <div class="turn-badge" id="turn-badge-top"></div>
                <div class="gp-hex-wrapper" id="gp-btn-top" onclick="toggleGPPool(opColor)"><div class="gp-hex-inner gp-btn-red">GP</div></div>
                <div class="hud-diamonds" id="td-top">
                    <div class="hud-diamond" id="td-top-1"></div><div class="hud-diamond" id="td-top-2"></div><div class="hud-diamond" id="td-top-3"></div>
                </div>
            </div>
            <div class="hp-bar-wrapper">
                <div class="hp-bar-fill purple-bar" id="hp-top-fill"></div>
                <div class="hp-text">HP <span id="hp-top-val">120</span> /120</div>
            </div>
        </div>
        <div class="hud-icon-diamond"><div class="hud-icon-inner">вЙ°</div></div>
    </div>
    
    <div class="hand-wrapper" style="height: 60px;">
        <div id="hand-top" class="hand-container"></div>
        <div class="gp-pool-panel top" id="gp-pool-top">
            <div class="gp-list" id="gp-list-top"></div>
            <div class="gp-pool-footer" id="gp-footer-top"></div>
        </div>
    </div>
    
    <div id="board-perspective-wrapper">
        <div id="board-container">
            <div id="board"></div>
            <svg id="combo-svg" viewBox="0 0 312 312">
                <defs>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                </defs>
                <g id="combo-lines-group"></g>
            </svg>
        </div>
    </div>

    <div id="log-display"></div>

    <div id="time-container">
        <div id="timer-label">TIME</div>
        <div id="timer-box">30</div>
    </div>

    <div class="hand-wrapper">
        <div id="hand-bottom" class="hand-container"></div>
        <div class="gp-pool-panel bottom" id="gp-pool-bottom">
            <div class="gp-list" id="gp-list-bottom"></div>
            <div class="gp-pool-footer" id="gp-footer-bottom"></div>
        </div>
    </div>

    <div class="hud-container" style="margin-bottom: 10px;">
        <div class="hud-icon-diamond" id="think-btn" onclick="useTimeExtension()">
            <div class="hud-icon-inner">вП±</div>
        </div>
        <div class="hud-center">
            <div class="hp-bar-wrapper" style="margin-bottom: 2px;">
                <div class="hp-bar-fill" id="hp-bottom-fill"></div>
                <div class="hp-text">HP <span id="hp-bottom-val">120</span> /120</div>
            </div>
            <div class="hud-controls-row">
                <div class="hud-diamonds" id="td-bottom">
                    <div class="hud-diamond" id="td-bottom-1"></div><div class="hud-diamond" id="td-bottom-2"></div><div class="hud-diamond" id="td-bottom-3"></div>
                </div>
                <div class="gp-hex-wrapper" id="gp-btn-bottom" onclick="toggleGPPool(myColor)"><div class="gp-hex-inner gp-btn-blue">GP</div></div>
                <div class="turn-badge" id="turn-badge-bottom"></div>
            </div>
        </div>
        <div class="hud-icon-diamond"><div class="hud-icon-inner">рЯТђ</div></div>
    </div>
</div>

<script src="card.js"></script>
<script src="game.js"></script>
<script>
    // гГЪгГЉгВЄи™≠гБњиЊЉгБњеЃМдЇЖжЩВгБЂеЃЯи°М
    window.onload = function() {
        const titleScreen = document.getElementById('title-screen');
        const modeOverlay = document.getElementById('mode-select-overlay');
        const deckOverlay = document.getElementById('deck-select-overlay');

        // еИЭжЬЯзКґжЕЛгБІгВњгВ§гГИгГЂдї•е§ЦгВТйЪ†гБЩ
        if (modeOverlay) modeOverlay.style.display = 'none';
        if (deckOverlay) deckOverlay.style.display = 'none';

        // гВњгВ§гГИгГЂзФїйЭҐгВТгВѓгГ™гГГгВѓгБЧгБЯжЩВгБЃеЗ¶зРЖ
        if (titleScreen) {
            titleScreen.addEventListener('click', function() {
                this.style.display = 'none'; // гВњгВ§гГИгГЂгВТжґИгБЩ
                if (modeOverlay) {
                    modeOverlay.style.display = 'flex'; // гГҐгГЉгГЙйБЄжКЮгВТи°®з§Ї
                }
            });
        }
    };
</script>
</body>
</html>
